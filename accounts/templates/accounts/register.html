{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Create Account</h2>
        <p class="auth-subtitle">Join our professional community.</p>
        {% include 'messages.html' %}
        <form method="POST">
            {% csrf_token %}

            <div class="form-row">

                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input required id="first_name" class="input" name="first_name" type="text" />
                </div>

                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input required id="last_name" class="input" name="last_name" type="text" />
                </div>

            </div>

            <div class="form-row">

                <div class="form-group">
                    <label for="email">Email</label>
                    <input required class="input" type="email" name="email" id="email">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input required id="username" class="input" name="username" type="text" />
                </div>

            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input class="input" required type="password" name="password" id="password">
                </div>
    
                <div class="form-group">
                    <label for="passwordConfirm">Confirm Password</label>
                    <input class="input" required type="password" name="passwordConfirm" id="passwordConfirm">
                </div>

            </div>

            <button type="submit" class="btn-register">
                Create Account
            </button>

        </form>

        <p class="login-link">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>

</div>

{% endblock %}
